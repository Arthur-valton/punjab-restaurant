<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUNJAB — Cuisine</title>
  <style>
    /* ── Apple iOS 17 Dark Mode tokens ── */
    :root {
      --bg:          #000000;
      --bg2:         #1c1c1e;
      --bg3:         #2c2c2e;
      --bg4:         #3a3a3c;
      --sep:         rgba(84,84,88,0.65);
      --sep-light:   rgba(84,84,88,0.3);
      --label:       #ffffff;
      --label2:      rgba(235,235,245,0.6);
      --label3:      rgba(235,235,245,0.3);
      --label4:      rgba(235,235,245,0.16);
      --green:       #34c759;
      --green-fill:  rgba(52,199,89,0.15);
      --orange:      #ff9f0a;
      --red:         #ff3b30;
      --red-fill:    rgba(255,59,48,0.15);
      --blue:        #0a84ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navigation bar iOS ── */
    header {
      background: rgba(28,28,30,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--sep);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; flex-direction: column; gap: 1px; }

    header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--label);
    }

    #counter {
      font-size: 0.65rem;
      color: var(--label3);
      font-weight: 500;
    }

    /* ── Status pill ── */
    #status {
      font-size: 0.68rem;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    #status.connected    { background: var(--green-fill); color: var(--green); }
    #status.connected::before { background: var(--green); }
    #status.disconnected { background: var(--red-fill);   color: var(--red); }
    #status.disconnected::before { background: var(--red); box-shadow: 0 0 0 2px rgba(255,59,48,0.25); }

    /* ── Empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 52px);
      color: var(--label4);
      font-size: 0.9rem;
      gap: 8px;
      font-weight: 500;
    }
    #empty span { font-size: 2.6rem; opacity: 0.4; }

    /* ── Grid ── */
    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    /* ── Card — Grouped list style iOS ── */
    .order-card {
      background: var(--bg2);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: spring-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .order-card.urgent  { box-shadow: 0 0 0 1.5px var(--red),   0 8px 32px rgba(255,59,48,0.2); }
    .order-card.warning { box-shadow: 0 0 0 1.5px var(--orange), 0 8px 32px rgba(255,159,10,0.15); }
    .order-card.fresh   { box-shadow: 0 8px 32px rgba(0,0,0,0.6); }

    @keyframes spring-in {
      from { transform: scale(0.92) translateY(-10px); opacity: 0; }
      to   { transform: scale(1) translateY(0);        opacity: 1; }
    }

    @keyframes spring-out {
      to { transform: scale(0.88); opacity: 0; }
    }

    .order-card.removing { animation: spring-out 0.22s ease forwards; }

    /* ── Card header ── */
    .card-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--sep-light);
    }

    .table-info { display: flex; flex-direction: column; gap: 1px; }

    .table-label {
      font-size: 0.58rem;
      color: var(--label3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .table-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--label);
      letter-spacing: -1px;
      line-height: 1;
    }

    .order-meta { text-align: right; display: flex; flex-direction: column; gap: 3px; }

    .order-num {
      font-size: 0.65rem;
      color: var(--label3);
      font-weight: 500;
    }

    /* ── Timer pill ── */
    .timer {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      display: inline-block;
      align-self: flex-end;
    }
    .timer.fresh   { background: var(--bg3); color: var(--label2); }
    .timer.warning { background: rgba(255,159,10,0.18); color: var(--orange); }
    .timer.urgent  { background: var(--red-fill); color: var(--red); }

    /* ── Card body ── */
    .card-items {
      padding: 8px 10px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Category group ── */
    .category-section {
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg3);
      transition: opacity 0.4s ease;
    }

    .category-section.done { opacity: 0.22; }

    .category-header {
      padding: 6px 11px 5px;
      border-bottom: 0.5px solid var(--sep-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .category-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--label3);
    }

    .category-section.done .category-label { color: var(--green); }

    .category-items {
      padding: 7px 11px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── PRÊT button ── */
    .btn-cat-ready {
      width: 100%;
      padding: 9px 11px;
      background: var(--bg4);
      color: var(--label2);
      border: none;
      border-top: 0.5px solid var(--sep-light);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.18s, color 0.18s;
      text-align: center;
    }

    .btn-cat-ready:hover  { background: rgba(52,199,89,0.16); color: var(--green); }
    .btn-cat-ready:active { background: rgba(52,199,89,0.28); color: var(--green); }
    .btn-cat-ready.done   { background: var(--bg3); color: rgba(52,199,89,0.45); cursor: default; }

    /* ── Bouton En cours ── */
    .btn-in-progress {
      background: rgba(10,132,255,0.18) !important;
      color: var(--blue) !important;
    }
    .btn-in-progress:hover { background: rgba(10,132,255,0.3) !important; }

    /* ── Section appelée par le service ── */
    @keyframes pulse-section {
      0%   { background: rgba(10,132,255,0.05); box-shadow: 0 0 0 1.5px rgba(10,132,255,0.5), 0 0 0 0 rgba(10,132,255,0.4); }
      50%  { background: rgba(10,132,255,0.3);  box-shadow: 0 0 0 2px rgba(10,132,255,1),   0 0 20px 4px rgba(10,132,255,0.35); }
      100% { background: rgba(10,132,255,0.05); box-shadow: 0 0 0 1.5px rgba(10,132,255,0.5), 0 0 0 0 rgba(10,132,255,0.4); }
    }

    .category-section.called {
      animation: pulse-section 0.7s ease-in-out infinite;
      border-radius: 10px;
    }

    @keyframes badge-flash {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(1.08); }
    }

    .called-badge {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      background: var(--blue);
      padding: 3px 10px;
      border-radius: 100px;
      animation: badge-flash 0.7s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(10,132,255,0.6);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Item row ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-qty {
      background: var(--bg4);
      color: var(--label2);
      font-weight: 600;
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 6px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .item-name {
      font-size: 0.86rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--label);
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>PUNJAB</h1>
    <div id="counter">0 commande(s)</div>
  </div>
  <div id="status" class="disconnected">Déconnecté</div>
</header>

<div id="empty">
  <span>🍽️</span>
  En attente de commandes…
</div>

<div id="orders"></div>

<script>
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/kds-ws";
  const ordersEl = document.getElementById("orders");
  const emptyEl = document.getElementById("empty");
  const statusEl = document.getElementById("status");
  const counterEl = document.getElementById("counter");

  const orders = new Map(); // id -> { data, timerInterval }
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "Connecté";
      statusEl.className = "connected";
    };

    ws.onclose = () => {
      statusEl.textContent = "Déconnecté";
      statusEl.className = "disconnected";
      setTimeout(connect, 3000); // reconnexion auto
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "new_order")   addOrder(msg.order);
      if (msg.type === "order_ready") removeOrder(msg.orderId);
      if (msg.type === "cat_status")  updateCatStatus(msg.orderId, msg.catName, msg.status);
    };
  }

  function updateCounter() {
    const n = orders.size;
    counterEl.textContent = `${n} commande${n > 1 ? "s" : ""} en cours`;
    emptyEl.style.display = n === 0 ? "flex" : "none";
  }

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}min ${ss < 10 ? "0" : ""}${ss}s` : `${ss}s`;
  }

  const CAT_ORDER = ["Entrees", "Plats", "Naans", "Desserts", "Menu Midi"];
  const CAT_MERGE = { "Biryani": "Plats" };

  function groupByCategory(items) {
    const seen = {};
    items.forEach(i => {
      const cat = CAT_MERGE[i.category] || i.category || "Autres";
      if (!seen[cat]) seen[cat] = [];
      seen[cat].push(i);
    });
    const sorted = [...CAT_ORDER.filter(c => seen[c]), ...Object.keys(seen).filter(c => !CAT_ORDER.includes(c))];
    return sorted.map(cat => ({ cat, items: seen[cat] }));
  }

  // Rendu d'une section catégorie avec statut
  function renderCatSection(orderId, g, idx, status) {
    const catKey = g.cat.replace(/\s/g, "_");
    const isCalled = status === "called";
    const isInProgress = status === "in_progress";
    const isDone = status === "done";

    let btnHtml = "";
    if (!isDone) {
      if (isCalled) {
        btnHtml = `<button class="btn-cat-ready btn-in-progress" onclick="markCatInProgress('${orderId}', ${idx})">▶ En cours</button>`;
      } else if (isInProgress) {
        btnHtml = `<button class="btn-cat-ready" onclick="markCatReady('${orderId}', ${idx})">✓ PRÊT</button>`;
      } else {
        // waiting : bouton PRÊT direct (si pas de service configuré)
        btnHtml = `<button class="btn-cat-ready" onclick="markCatReady('${orderId}', ${idx})">✓ PRÊT</button>`;
      }
    }

    return `
      <div class="category-section ${isDone ? "done" : ""} ${isCalled ? "called" : ""}"
           id="cat-${orderId}-${catKey}">
        <div class="category-header">
          <span class="category-label">${g.cat}</span>
          ${isCalled ? '<span class="called-badge">SERVICE !</span>' : ""}
        </div>
        <div class="category-items">
          ${g.items.map(i => `
            <div class="item-row">
              <span class="item-qty">${i.qty}x</span>
              <span class="item-name">${i.name}</span>
            </div>
          `).join("")}
        </div>
        ${btnHtml}
      </div>
    `;
  }

  function renderCategories(orderId, groups, catStatus) {
    return groups.map((g, idx) => renderCatSection(orderId, g, idx, (catStatus || {})[g.cat] || "waiting")).join("");
  }

  function updateCatStatus(orderId, catName, status) {
    const entry = orders.get(orderId);
    if (!entry) return;
    // Mettre à jour le statut local
    if (!entry.order.catStatus) entry.order.catStatus = {};
    entry.order.catStatus[catName] = status;

    const catKey = catName.replace(/\s/g, "_");
    const section = document.getElementById(`cat-${orderId}-${catKey}`);
    if (!section) return;

    const idx = entry.groups.findIndex(g => g.cat === catName);
    if (idx === -1) return;

    const g = entry.groups[idx];
    const newHtml = renderCatSection(orderId, g, idx, status);
    const temp = document.createElement("div");
    temp.innerHTML = newHtml;
    section.replaceWith(temp.firstElementChild);
  }

  function markCatInProgress(orderId, catIdx) {
    const entry = orders.get(orderId);
    if (!entry) return;
    const group = entry.groups[catIdx];
    ws.send(JSON.stringify({ type: "cat_in_progress", orderId, catName: group.cat }));
  }

  function markCatReady(orderId, catIdx) {
    const entry = orders.get(orderId);
    if (!entry) return;

    const group = entry.groups[catIdx];
    const catKey = group.cat.replace(/\s/g, "_");
    const section = document.getElementById(`cat-${orderId}-${catKey}`);
    if (!section || section.classList.contains("done")) return;

    ws.send(JSON.stringify({
      type: "cat_ready",
      orderId,
      tableNumber: entry.order.tableNumber,
      orderNum: entry.order.orderNum,
      catName: group.cat,
      items: group.items,
    }));

    // Vérifier si toutes les catégories sont prêtes
    setTimeout(() => {
      const catStatus = entry.order.catStatus || {};
      const allDone = entry.groups.every(g => catStatus[g.cat] === "done" || g.cat === group.cat);
      if (allDone) setTimeout(() => markReady(orderId), 400);
    }, 200);
  }

  function addOrder(order) {
    const groups = groupByCategory(order.items);
    const card = document.createElement("div");
    card.className = "order-card fresh";
    card.id = `order-${order.id}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="table-info">
          <div class="table-label">TABLE</div>
          <div class="table-num">${order.tableNumber}</div>
        </div>
        <div class="order-meta">
          <div class="order-num">#${order.orderNum}</div>
          <div class="timer fresh" id="timer-${order.id}">0s</div>
        </div>
      </div>
      <div class="card-items">
        ${renderCategories(order.id, groups, order.catStatus)}
      </div>
    `;

    ordersEl.prepend(card);

    // Chrono
    const timerEl = document.getElementById(`timer-${order.id}`);
    const interval = setInterval(() => {
      const elapsed = Date.now() - order.receivedAt;
      timerEl.textContent = formatElapsed(elapsed);

      const minutes = elapsed / 60000;
      if (minutes >= 10) {
        timerEl.className = "timer urgent";
        card.className = "order-card urgent";
      } else if (minutes >= 5) {
        timerEl.className = "timer warning";
        card.className = "order-card warning";
      }
    }, 1000);

    orders.set(order.id, { card, interval, groups, order });
    updateCounter();
  }

  function markReady(orderId) {
    ws.send(JSON.stringify({ type: "order_ready", orderId }));
    removeOrder(orderId);
  }

  function removeOrder(orderId) {
    const entry = orders.get(orderId);
    if (!entry) return;
    clearInterval(entry.interval);
    entry.card.classList.add("removing");
    setTimeout(() => {
      entry.card.remove();
      orders.delete(orderId);
      updateCounter();
    }, 300);
  }

  connect();
</script>
</body>
</html>
