<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUNJAB — Cuisine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #161618;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: rgba(28, 28, 30, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 4px;
      color: #ebebf5;
    }

    #status {
      font-size: 0.7rem;
      padding: 4px 11px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    #status.connected    { background: rgba(52,199,89,0.12); color: #30d158; border: 1px solid rgba(52,199,89,0.25); }
    #status.disconnected { background: rgba(255,69,58,0.1);  color: #ff6961; border: 1px solid rgba(255,69,58,0.2); }

    #counter {
      font-size: 0.75rem;
      color: rgba(235,235,245,0.3);
      font-weight: 500;
    }

    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 56px);
      color: rgba(235,235,245,0.18);
      font-size: 0.95rem;
      gap: 10px;
      font-weight: 500;
    }

    #empty span { font-size: 2.8rem; }

    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 11px;
      padding: 14px;
    }

    .order-card {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slide-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.04);
    }

    .order-card.urgent  { border-color: rgba(255,105,97,0.45);  box-shadow: 0 2px 20px rgba(255,69,58,0.18); }
    .order-card.warning { border-color: rgba(255,185,50,0.4);   box-shadow: 0 2px 20px rgba(255,159,10,0.12); }
    .order-card.fresh   { border-color: rgba(48,209,88,0.35);   box-shadow: 0 2px 16px rgba(0,0,0,0.5); }

    @keyframes slide-in {
      from { transform: translateY(-14px) scale(0.97); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes fade-out {
      to { transform: scale(0.96); opacity: 0; }
    }

    .order-card.removing {
      animation: fade-out 0.25s ease forwards;
    }

    .card-header {
      padding: 10px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .table-num {
      font-size: 1.45rem;
      font-weight: 700;
      color: #ebebf5;
      letter-spacing: -0.5px;
    }

    .table-label {
      font-size: 0.56rem;
      color: rgba(235,235,245,0.3);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      font-weight: 600;
    }

    .order-meta {
      text-align: right;
    }

    .order-num {
      font-size: 0.68rem;
      color: rgba(235,235,245,0.28);
      font-weight: 500;
    }

    .timer {
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 2px;
      letter-spacing: -0.2px;
    }
    .timer.fresh   { color: #8e8e93; }
    .timer.warning { color: #ffd60a; }
    .timer.urgent  { color: #ff6961; }

    .card-items {
      padding: 8px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .category-section {
      margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      transition: opacity 0.3s ease;
    }

    .category-section:first-child { margin-top: 0; }

    .category-section.done {
      opacity: 0.25;
    }

    .category-header {
      background: rgba(255,255,255,0.04);
      padding: 5px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .category-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(235,235,245,0.55);
    }

    .category-section.done .category-label {
      color: #30d158;
    }

    .category-items {
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .btn-cat-ready {
      width: 100%;
      padding: 9px;
      background: rgba(255,255,255,0.05);
      color: rgba(235,235,245,0.6);
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cat-ready:hover  { background: rgba(48,209,88,0.12); color: #30d158; }
    .btn-cat-ready:active { background: rgba(48,209,88,0.22); color: #30d158; }
    .btn-cat-ready.done   { background: transparent; color: rgba(48,209,88,0.4); cursor: default; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.87rem;
    }

    .item-qty {
      background: rgba(255,255,255,0.1);
      color: rgba(235,235,245,0.7);
      font-weight: 600;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 6px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .item-name {
      font-weight: 400;
      line-height: 1.25;
      color: rgba(235,235,245,0.82);
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>PUNJAB</h1>
    <div id="counter">0 commande(s)</div>
  </div>
  <div id="status" class="disconnected">Déconnecté</div>
</header>

<div id="empty">
  <span>🍽️</span>
  En attente de commandes…
</div>

<div id="orders"></div>

<script>
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/kds-ws";
  const ordersEl = document.getElementById("orders");
  const emptyEl = document.getElementById("empty");
  const statusEl = document.getElementById("status");
  const counterEl = document.getElementById("counter");

  const orders = new Map(); // id -> { data, timerInterval }
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "Connecté";
      statusEl.className = "connected";
    };

    ws.onclose = () => {
      statusEl.textContent = "Déconnecté";
      statusEl.className = "disconnected";
      setTimeout(connect, 3000); // reconnexion auto
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "new_order") addOrder(msg.order);
      if (msg.type === "order_ready") removeOrder(msg.orderId);
    };
  }

  function updateCounter() {
    const n = orders.size;
    counterEl.textContent = `${n} commande${n > 1 ? "s" : ""} en cours`;
    emptyEl.style.display = n === 0 ? "flex" : "none";
  }

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}min ${ss < 10 ? "0" : ""}${ss}s` : `${ss}s`;
  }

  const CAT_ORDER = ["Entrees", "Plats", "Naans", "Desserts", "Menu Midi"];
  const CAT_MERGE = { "Biryani": "Plats" };

  function groupByCategory(items) {
    const seen = {};
    items.forEach(i => {
      const cat = CAT_MERGE[i.category] || i.category || "Autres";
      if (!seen[cat]) seen[cat] = [];
      seen[cat].push(i);
    });
    const sorted = [...CAT_ORDER.filter(c => seen[c]), ...Object.keys(seen).filter(c => !CAT_ORDER.includes(c))];
    return sorted.map(cat => ({ cat, items: seen[cat] }));
  }

  function renderCategories(orderId, groups) {
    return groups.map((g, idx) => `
      <div class="category-section" id="cat-${orderId}-${idx}">
        <div class="category-header">
          <span class="category-label">${g.cat}</span>
        </div>
        <div class="category-items">
          ${g.items.map(i => `
            <div class="item-row">
              <span class="item-qty">${i.qty}x</span>
              <span class="item-name">${i.name}</span>
            </div>
          `).join("")}
        </div>
        <button class="btn-cat-ready" onclick="markCatReady('${orderId}', ${idx})">✓ PRÊT</button>
      </div>
    `).join("");
  }

  function markCatReady(orderId, catIdx) {
    const section = document.getElementById(`cat-${orderId}-${catIdx}`);
    if (!section || section.classList.contains("done")) return;
    section.classList.add("done");
    const btn = section.querySelector(".btn-cat-ready");
    btn.textContent = "✓ Prêt";
    btn.classList.add("done");
    btn.disabled = true;

    const entry = orders.get(orderId);
    if (!entry) return;

    // Imprimer ticket partiel pour cette catégorie
    const group = entry.groups[catIdx];
    ws.send(JSON.stringify({
      type: "cat_ready",
      tableNumber: entry.order.tableNumber,
      orderNum: entry.order.orderNum,
      catName: group.cat,
      items: group.items,
    }));

    // Vérifier si toutes les catégories sont prêtes
    const allSections = document.querySelectorAll(`[id^="cat-${orderId}-"]`);
    const allDone = [...allSections].every(s => s.classList.contains("done"));
    if (allDone) {
      setTimeout(() => markReady(orderId), 400);
    }
  }

  function addOrder(order) {
    const groups = groupByCategory(order.items);
    const card = document.createElement("div");
    card.className = "order-card fresh";
    card.id = `order-${order.id}`;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="table-label">TABLE</div>
          <div class="table-num">${order.tableNumber}</div>
        </div>
        <div class="order-meta">
          <div class="order-num">#${order.orderNum}</div>
          <div class="timer fresh" id="timer-${order.id}">0s</div>
        </div>
      </div>
      <div class="card-items">
        ${renderCategories(order.id, groups)}
      </div>
    `;

    ordersEl.prepend(card);

    // Chrono
    const timerEl = document.getElementById(`timer-${order.id}`);
    const interval = setInterval(() => {
      const elapsed = Date.now() - order.receivedAt;
      timerEl.textContent = formatElapsed(elapsed);

      const minutes = elapsed / 60000;
      if (minutes >= 10) {
        timerEl.className = "timer urgent";
        card.className = "order-card urgent";
      } else if (minutes >= 5) {
        timerEl.className = "timer warning";
        card.className = "order-card warning";
      }
    }, 1000);

    orders.set(order.id, { card, interval, groups, order });
    updateCounter();
  }

  function markReady(orderId) {
    ws.send(JSON.stringify({ type: "order_ready", orderId }));
    removeOrder(orderId);
  }

  function removeOrder(orderId) {
    const entry = orders.get(orderId);
    if (!entry) return;
    clearInterval(entry.interval);
    entry.card.classList.add("removing");
    setTimeout(() => {
      entry.card.remove();
      orders.delete(orderId);
      updateCounter();
    }, 300);
  }

  connect();
</script>
</body>
</html>
