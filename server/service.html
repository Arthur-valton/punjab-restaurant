<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUNJAB — Service</title>
  <style>
    :root {
      --bg:        #000;
      --bg2:       #1c1c1e;
      --bg3:       #2c2c2e;
      --bg4:       #3a3a3c;
      --sep:       rgba(84,84,88,0.55);
      --label:     #ffffff;
      --label2:    rgba(235,235,245,0.6);
      --label3:    rgba(235,235,245,0.3);
      --green:     #34c759;
      --orange:    #ff9f0a;
      --red:       #ff3b30;
      --blue:      #0a84ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: rgba(28,28,30,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--sep);
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; flex-direction: column; gap: 1px; }

    header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--label);
    }

    #counter {
      font-size: 0.62rem;
      color: var(--label3);
      font-weight: 500;
    }

    #status {
      font-size: 0.68rem;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    #status.connected    { background: rgba(52,199,89,0.15);  color: var(--green);  }
    #status.connected::before { background: var(--green); }
    #status.disconnected { background: rgba(255,59,48,0.12);  color: var(--red);    }
    #status.disconnected::before { background: var(--red); }

    /* ── Empty ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 52px);
      color: rgba(235,235,245,0.15);
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    #empty span { font-size: 2.6rem; opacity: 0.35; }

    /* ── Grid commandes ── */
    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    /* ── Carte commande ── */
    .order-card {
      background: var(--bg2);
      border-radius: 16px;
      overflow: hidden;
      animation: spring-in 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    }

    @keyframes spring-in {
      from { transform: scale(0.93) translateY(-8px); opacity: 0; }
      to   { transform: scale(1) translateY(0);       opacity: 1; }
    }

    @keyframes spring-out {
      to { transform: scale(0.88); opacity: 0; }
    }
    .order-card.removing { animation: spring-out 0.22s ease forwards; }

    /* ── Header carte ── */
    .card-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--sep);
    }

    .table-info { display: flex; flex-direction: column; gap: 1px; }

    .table-label {
      font-size: 0.56rem;
      color: var(--label3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
    }

    .table-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--label);
      letter-spacing: -1px;
      line-height: 1;
    }

    .order-meta { text-align: right; }

    .order-num {
      font-size: 0.65rem;
      color: var(--label3);
      font-weight: 500;
    }

    /* ── Body carte ── */
    .card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* ── Section catégorie ── */
    .cat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg3);
      border-radius: 10px;
      padding: 10px 12px;
      gap: 10px;
      transition: opacity 0.3s;
    }

    .cat-row.done { opacity: 0.25; }

    .cat-info { display: flex; flex-direction: column; gap: 2px; }

    .cat-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cat-status-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--label3);
    }
    .cat-status-label.called     { color: var(--blue); }
    .cat-status-label.in_progress { color: var(--orange); }
    .cat-status-label.done       { color: var(--green); }

    /* ── Bouton Envoyer ── */
    .btn-send {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 100px;
      border: none;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.02em;
    }

    .btn-send.waiting {
      background: var(--blue);
      color: #fff;
    }
    .btn-send.waiting:active { opacity: 0.7; transform: scale(0.96); }

    .btn-send.called {
      background: rgba(10,132,255,0.15);
      color: var(--blue);
      cursor: default;
    }

    .btn-send.in_progress {
      background: rgba(255,159,10,0.15);
      color: var(--orange);
      cursor: default;
    }

    .btn-send.done {
      background: rgba(52,199,89,0.12);
      color: var(--green);
      cursor: default;
    }

    /* ── Indicateur clignotant ── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot.called     { background: var(--blue);   animation: pulse-dot 1s infinite; }
    .dot.in_progress { background: var(--orange); animation: pulse-dot 0.8s infinite; }
    .dot.done       { background: var(--green); animation: none; }
    .dot.waiting    { display: none; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>SERVICE</h1>
    <div id="counter">0 table(s)</div>
  </div>
  <div id="status" class="disconnected">Déconnecté</div>
</header>

<div id="empty">
  <span>🍽️</span>
  Aucune commande en cours
</div>

<div id="orders"></div>

<script>
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/kds-ws";
  const ordersEl = document.getElementById("orders");
  const emptyEl  = document.getElementById("empty");
  const statusEl = document.getElementById("status");
  const counterEl = document.getElementById("counter");

  const orders = new Map();
  let ws;

  const CAT_ORDER = ["Entrees", "Plats", "Naans", "Desserts", "Menu Midi"];
  const CAT_LABELS = { Entrees: "Entrées", Plats: "Plats", Naans: "Naans", Desserts: "Desserts", "Menu Midi": "Menu Midi" };
  const STATUS_LABELS = { waiting: "En attente", called: "Demandé…", in_progress: "En cours", done: "Prêt ✓" };
  const BTN_LABELS = { waiting: "Envoyer", called: "Demandé", in_progress: "En cours", done: "Prêt" };

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "Connecté";
      statusEl.className = "connected";
    };

    ws.onclose = () => {
      statusEl.textContent = "Déconnecté";
      statusEl.className = "disconnected";
      setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === "new_order") {
        addOrder(msg.order);
      }

      if (msg.type === "cat_status") {
        updateCatStatus(msg.orderId, msg.catName, msg.status);
      }

      if (msg.type === "order_ready") {
        removeOrder(msg.orderId);
      }
    };
  }

  function sendServiceCall(orderId, catName) {
    ws.send(JSON.stringify({ type: "service_call", orderId, catName }));
  }

  function buildCatRows(order) {
    const catStatus = order.catStatus || {};
    const cats = Object.keys(catStatus);
    const sorted = [...CAT_ORDER.filter(c => cats.includes(c)), ...cats.filter(c => !CAT_ORDER.includes(c))];

    return sorted.map(cat => {
      const status = catStatus[cat] || "waiting";
      const label = CAT_LABELS[cat] || cat;
      const isWaiting = status === "waiting";
      return `
        <div class="cat-row ${status === 'done' ? 'done' : ''}" id="cat-row-${order.id}-${cat.replace(/\s/g,'_')}">
          <div class="cat-info">
            <div class="cat-name">
              <span class="dot ${status}"></span>${label}
            </div>
            <div class="cat-status-label ${status}">${STATUS_LABELS[status] || status}</div>
          </div>
          <button
            class="btn-send ${status}"
            ${!isWaiting ? "disabled" : ""}
            onclick="sendServiceCall('${order.id}', '${cat}')"
          >${BTN_LABELS[status]}</button>
        </div>
      `;
    }).join("");
  }

  function addOrder(order) {
    if (orders.has(order.id)) return;
    const card = document.createElement("div");
    card.className = "order-card";
    card.id = `order-${order.id}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="table-info">
          <div class="table-label">Table</div>
          <div class="table-num">${order.tableNumber}</div>
        </div>
        <div class="order-meta">
          <div class="order-num">#${order.orderNum}</div>
        </div>
      </div>
      <div class="card-body" id="body-${order.id}">
        ${buildCatRows(order)}
      </div>
    `;
    ordersEl.prepend(card);
    orders.set(order.id, order);
    updateCounter();
  }

  function updateCatStatus(orderId, catName, status) {
    const order = orders.get(orderId);
    if (!order) return;
    if (!order.catStatus) order.catStatus = {};
    order.catStatus[catName] = status;

    // Mettre à jour la ligne catégorie
    const rowId = `cat-row-${orderId}-${catName.replace(/\s/g,'_')}`;
    const row = document.getElementById(rowId);
    if (!row) return;

    const label = CAT_LABELS[catName] || catName;
    row.className = `cat-row${status === 'done' ? ' done' : ''}`;
    row.innerHTML = `
      <div class="cat-info">
        <div class="cat-name">
          <span class="dot ${status}"></span>${label}
        </div>
        <div class="cat-status-label ${status}">${STATUS_LABELS[status] || status}</div>
      </div>
      <button
        class="btn-send ${status}"
        ${status !== 'waiting' ? "disabled" : ""}
        onclick="sendServiceCall('${orderId}', '${catName}')"
      >${BTN_LABELS[status]}</button>
    `;
  }

  function removeOrder(orderId) {
    const card = document.getElementById(`order-${orderId}`);
    if (card) {
      card.classList.add("removing");
      setTimeout(() => card.remove(), 250);
    }
    orders.delete(orderId);
    updateCounter();
  }

  function updateCounter() {
    const n = orders.size;
    counterEl.textContent = `${n} table${n > 1 ? "s" : ""} en cours`;
    emptyEl.style.display = n === 0 ? "flex" : "none";
    ordersEl.style.display = n === 0 ? "none" : "grid";
  }

  updateCounter();
  connect();
</script>
</body>
</html>
