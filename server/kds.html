<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUNJAB — Cuisine</title>
  <style>
    /* ── Apple iOS 17 Dark Mode tokens ── */
    :root {
      --bg:          #000000;
      --bg2:         #1c1c1e;
      --bg3:         #2c2c2e;
      --bg4:         #3a3a3c;
      --sep:         rgba(84,84,88,0.65);
      --sep-light:   rgba(84,84,88,0.3);
      --label:       #ffffff;
      --label2:      rgba(235,235,245,0.6);
      --label3:      rgba(235,235,245,0.3);
      --label4:      rgba(235,235,245,0.16);
      --green:       #34c759;
      --green-fill:  rgba(52,199,89,0.15);
      --orange:      #ff9f0a;
      --red:         #ff3b30;
      --red-fill:    rgba(255,59,48,0.15);
      --blue:        #0a84ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navigation bar iOS ── */
    header {
      background: rgba(28,28,30,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--sep);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left { display: flex; flex-direction: column; gap: 1px; }

    header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--label);
    }

    #counter {
      font-size: 0.65rem;
      color: var(--label3);
      font-weight: 500;
    }

    /* ── Status pill ── */
    #status {
      font-size: 0.68rem;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    #status.connected    { background: var(--green-fill); color: var(--green); }
    #status.connected::before { background: var(--green); }
    #status.disconnected { background: var(--red-fill);   color: var(--red); }
    #status.disconnected::before { background: var(--red); box-shadow: 0 0 0 2px rgba(255,59,48,0.25); }

    /* ── Empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 52px);
      color: var(--label4);
      font-size: 0.9rem;
      gap: 8px;
      font-weight: 500;
    }
    #empty span { font-size: 2.6rem; opacity: 0.4; }

    /* ── Grid ── */
    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    @media (min-width: 768px) {
      #orders {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        padding: 20px;
      }
    }

    @media (min-width: 1024px) {
      #orders {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        padding: 24px;
      }
    }

    /* ── Card — Grouped list style iOS ── */
    .order-card {
      background: var(--bg2);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: spring-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .order-card.urgent  { box-shadow: 0 0 0 1.5px var(--red),   0 8px 32px rgba(255,59,48,0.2); }
    .order-card.warning { box-shadow: 0 0 0 1.5px var(--orange), 0 8px 32px rgba(255,159,10,0.15); }
    .order-card.fresh   { box-shadow: 0 8px 32px rgba(0,0,0,0.6); }

    @keyframes spring-in {
      from { transform: scale(0.92) translateY(-10px); opacity: 0; }
      to   { transform: scale(1) translateY(0);        opacity: 1; }
    }

    @keyframes spring-out {
      to { transform: scale(0.88); opacity: 0; }
    }

    .order-card.removing { animation: spring-out 0.22s ease forwards; }

    /* ── Card header ── */
    .card-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--sep-light);
    }

    .table-info { display: flex; flex-direction: column; gap: 1px; }

    .table-label {
      font-size: 0.58rem;
      color: var(--label3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .table-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--label);
      letter-spacing: -1px;
      line-height: 1;
    }

    .order-meta { text-align: right; display: flex; flex-direction: column; gap: 3px; }

    .order-num {
      font-size: 0.65rem;
      color: var(--label3);
      font-weight: 500;
    }

    /* ── Timer pill global (neutre, pas de changement couleur) ── */
    .timer {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      display: inline-block;
      align-self: flex-end;
      background: var(--bg3);
      color: var(--label2);
    }

    /* ── Timer par catégorie ── */
    .cat-timer {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--label2);
      background: rgba(84,84,88,0.3);
      padding: 2px 7px;
      border-radius: 100px;
    }

    /* ── Card body ── */
    .card-items {
      padding: 8px 10px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Category group ── */
    .category-section {
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg3);
      transition: opacity 0.4s ease;
    }

    .category-section.done {
      opacity: 0.22;
      pointer-events: none;
      filter: grayscale(60%);
    }
    .category-section.done .category-label { color: var(--green) !important; }

    /* Card entière quand toutes les catégories sont prêtes */
    .order-card.all-done {
      opacity: 0.5;
      box-shadow: 0 0 0 1.5px var(--green), 0 8px 24px rgba(52,199,89,0.15);
      transition: opacity 0.4s ease, box-shadow 0.4s ease;
    }

    .category-header {
      padding: 8px 12px 7px;
      border-bottom: 0.5px solid var(--sep-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .category-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--label3);
    }

    .category-section.done .category-label { color: var(--green); }

    .category-items {
      padding: 7px 11px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Hint action bas de section ── */
    .cat-action-hint {
      display: block;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 7px;
      border-top: 0.5px solid rgba(84,84,88,0.3);
      color: var(--label3);
      letter-spacing: 0.04em;
    }
    .cat-action-hint.in_progress { color: var(--orange); }

    /* ── Badge EN COURS ── */
    .in-progress-badge {
      background: var(--orange) !important;
      box-shadow: 0 0 8px rgba(255,159,10,0.6) !important;
    }

    /* ── Section EN COURS ── */
    .in-progress-section {
      box-shadow: 0 0 0 1.5px var(--orange);
    }

    /* ── Badge ✓ done ── */
    .done-badge {
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--green);
    }

    /* ── Section appelée par le service ── */
    @keyframes pulse-section {
      0%   { background: rgba(10,132,255,0.9);  box-shadow: 0 0 0 2px rgba(10,132,255,1), 0 0 24px 6px rgba(10,132,255,0.6); }
      49%  { background: rgba(10,132,255,0.9);  box-shadow: 0 0 0 2px rgba(10,132,255,1), 0 0 24px 6px rgba(10,132,255,0.6); }
      50%  { background: var(--bg3);            box-shadow: none; }
      99%  { background: var(--bg3);            box-shadow: none; }
      100% { background: rgba(10,132,255,0.9);  box-shadow: 0 0 0 2px rgba(10,132,255,1), 0 0 24px 6px rgba(10,132,255,0.6); }
    }

    .category-section.called {
      animation: pulse-section 0.6s steps(1) infinite;
      border-radius: 10px;
    }

    @keyframes badge-flash {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(1.08); }
    }

    .called-badge {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      background: var(--blue);
      padding: 3px 10px;
      border-radius: 100px;
      animation: badge-flash 0.7s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(10,132,255,0.6);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Item row ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-qty {
      background: var(--bg4);
      color: var(--label2);
      font-weight: 600;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .item-name {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--label);
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>CUISINE</h1>
    <div id="counter">0 commande(s)</div>
  </div>
  <div id="status" class="disconnected">Déconnecté</div>
</header>

<div id="empty">
  <span>🍽️</span>
  En attente de commandes…
</div>

<div id="orders"></div>

<script>
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/kds-ws";
  const ordersEl = document.getElementById("orders");
  const emptyEl = document.getElementById("empty");
  const statusEl = document.getElementById("status");
  const counterEl = document.getElementById("counter");

  const orders = new Map();
  let ws;
  let pingInterval;

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "Connecté";
      statusEl.className = "connected";
      // Ping toutes les 10s pour garder la connexion vivante
      clearInterval(pingInterval);
      pingInterval = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "ping" }));
        } else {
          clearInterval(pingInterval);
          connect();
        }
      }, 10000);
    };

    ws.onclose = () => {
      statusEl.textContent = "Déconnecté";
      statusEl.className = "disconnected";
      clearInterval(pingInterval);
      setTimeout(connect, 1000); // reconnexion rapide
    };

    ws.onerror = () => {
      ws.close();
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "new_order")   addOrder(msg.order);
      if (msg.type === "order_ready") removeOrder(msg.orderId);
      if (msg.type === "cat_status")  updateCatStatus(msg.orderId, msg.catName, msg.status, msg);
    };
  }

  function updateCounter() {
    const n = orders.size;
    counterEl.textContent = `${n} commande${n > 1 ? "s" : ""} en cours`;
    emptyEl.style.display = n === 0 ? "flex" : "none";
  }

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return m > 0 ? `${m}min ${ss < 10 ? "0" : ""}${ss}s` : `${ss}s`;
  }

  const CAT_ORDER = ["Entrees", "Plats", "Naans", "Desserts", "Menu Midi"];
  const CAT_EXCLUDE_KDS = ["Boissons"];
  const CAT_MERGE = { "Biryani": "Plats" };

  function groupByCategory(items) {
    const seen = {};
    items.forEach(i => {
      const cat = CAT_MERGE[i.category] || i.category || "Autres";
      if (CAT_EXCLUDE_KDS.includes(cat)) return; // Boissons → pas en cuisine
      if (!seen[cat]) seen[cat] = [];
      seen[cat].push(i);
    });
    const sorted = [...CAT_ORDER.filter(c => seen[c]), ...Object.keys(seen).filter(c => !CAT_ORDER.includes(c))];
    return sorted.map(cat => ({ cat, items: seen[cat] }));
  }

  // Rendu d'une section catégorie avec statut
  function renderCatSection(orderId, g, idx, status) {
    const catKey = g.cat.replace(/\s/g, "_");
    const isCalled     = status === "called";
    const isInProgress = status === "in_progress";
    const isDone       = status === "done" || status === "delivered";

    // Grisé inline pour que ça marche même au chargement initial
    if (isDone) {
      const itemsHtml = g.items.map(i =>
        `<div class="item-row"><span class="item-qty">${i.qty}x</span><span class="item-name">${i.name}</span></div>`
      ).join("");
      return `<div class="category-section done" id="cat-${orderId}-${catKey}" style="opacity:0.22;pointer-events:none;filter:grayscale(60%);">
        <div class="category-header">
          <span class="category-label" style="color:var(--green)">${g.cat}</span>
          <div style="display:flex;align-items:center;gap:6px;"><span class="done-badge">✓</span></div>
        </div>
        <div class="category-items">${itemsHtml}</div>
      </div>`;
    }

    let onclick = "";
    let statusLabel = "";
    if (isCalled) {
      onclick = `onclick="markCatInProgress('${orderId}', ${idx})"`;
      statusLabel = `<span class="cat-action-hint">Appuyer pour démarrer</span>`;
    } else if (isInProgress) {
      onclick = `onclick="markCatReady('${orderId}', ${idx})"`;
      statusLabel = `<span class="cat-action-hint in_progress">Appuyer pour valider</span>`;
    }

    const showTimer = isCalled || isInProgress;

    return `<div class="category-section ${isCalled ? "called" : ""} ${isInProgress ? "in-progress-section" : ""}"
         id="cat-${orderId}-${catKey}"
         ${onclick}
         style="${showTimer ? 'cursor:pointer;' : ''}">
      <div class="category-header">
        <span class="category-label">${g.cat}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          ${showTimer ? `<span class="cat-timer" id="cat-timer-${orderId}-${catKey}">0s</span>` : ""}
          ${isCalled    ? '<span class="called-badge">SERVICE !</span>' : ""}
          ${isInProgress ? '<span class="called-badge in-progress-badge">EN COURS</span>' : ""}
        </div>
      </div>
      <div class="category-items">
        ${g.items.map(i => `<div class="item-row"><span class="item-qty">${i.qty}x</span><span class="item-name">${i.name}</span></div>`).join("")}
      </div>
      ${statusLabel}
    </div>`;
  }

  function renderCategories(orderId, groups, catStatus) {
    return groups.map((g, idx) => renderCatSection(orderId, g, idx, (catStatus || {})[g.cat] || "waiting")).join("");
  }

  function updateCatStatus(orderId, catName, status, msg = {}) {
    const entry = orders.get(orderId);
    if (!entry) return;
    if (!entry.order.catStatus) entry.order.catStatus = {};
    entry.order.catStatus[catName] = status;

    if (status === "called" && !entry.catStartTimes[catName]) {
      entry.catStartTimes[catName] = msg.calledAt ? Number(msg.calledAt) : Date.now();
    }
    if (status === "done") {
      delete entry.catStartTimes[catName];
    }

    const catKey = catName.replace(/\s/g, "_");
    const section = document.getElementById(`cat-${orderId}-${catKey}`);

    if (section) {
      if (status === "done" || status === "delivered") {
        // Grisé direct — manipulation de l'élément existant
        section.className = "category-section done";
        section.onclick = null;
        section.removeAttribute("style");
        const badgesDiv = section.querySelector(".category-header > div");
        if (badgesDiv) badgesDiv.innerHTML = '<span class="done-badge">✓</span>';
        const hint = section.querySelector(".cat-action-hint");
        if (hint) hint.remove();
        const timerEl = section.querySelector(".cat-timer");
        if (timerEl) timerEl.remove();
      } else {
        const idx = entry.groups.findIndex(g => g.cat === catName);
        if (idx !== -1) {
          const newHtml = renderCatSection(orderId, entry.groups[idx], idx, status);
          const temp = document.createElement("div");
          temp.innerHTML = newHtml.trim();
          const newEl = temp.firstElementChild;
          if (newEl) section.replaceWith(newEl);
        }
      }
    }

    // Toutes catégories done → carte verte puis suppression
    if (status === "done") {
      const catStatus = entry.order.catStatus || {};
      const allDone = entry.groups.every(g => catStatus[g.cat] === "done");
      if (allDone) {
        const card = document.getElementById(`order-${orderId}`);
        if (card) card.classList.add("all-done");
        setTimeout(() => markReady(orderId), 3000);
      }
    }
  }

  function markCatInProgress(orderId, catIdx) {
    const entry = orders.get(orderId);
    if (!entry) return;
    const group = entry.groups[catIdx];
    ws.send(JSON.stringify({ type: "cat_in_progress", orderId, catName: group.cat }));
  }

  function markCatReady(orderId, catIdx) {
    const entry = orders.get(orderId);
    if (!entry) return;

    const group = entry.groups[catIdx];
    const catKey = group.cat.replace(/\s/g, "_");
    const section = document.getElementById(`cat-${orderId}-${catKey}`);
    if (!section || section.classList.contains("done")) return;

    // Grisé immédiat sans attendre le serveur
    section.classList.remove("in-progress-section", "called");
    section.classList.add("done");
    section.onclick = null;
    section.style.cursor = "default";
    const hint = section.querySelector(".cat-action-hint");
    if (hint) hint.remove();
    const badge = section.querySelector(".called-badge");
    if (badge) { badge.className = "done-badge"; badge.textContent = "✓"; }

    ws.send(JSON.stringify({
      type: "cat_ready",
      orderId,
      tableNumber: entry.order.tableNumber,
      orderNum: entry.order.orderNum,
      catName: group.cat,
      items: group.items,
    }));
  }

  function addOrder(order) {
    const groups = groupByCategory(order.items);
    const card = document.createElement("div");
    card.className = "order-card fresh";
    card.id = `order-${order.id}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="table-info">
          <div class="table-label">TABLE</div>
          <div class="table-num">${order.tableNumber}</div>
        </div>
        <div class="order-meta">
          <div class="order-num">#${order.orderNum}</div>
          <div class="timer fresh" id="timer-${order.id}">0s</div>
        </div>
      </div>
      <div class="card-items">
        ${renderCategories(order.id, groups, order.catStatus)}
      </div>
    `;

    ordersEl.prepend(card);

    const catStartTimes = {};
    // Restaurer les timers de catégorie depuis catCalledAt (persisté)
    if (order.catCalledAt) {
      for (const [cat, ts] of Object.entries(order.catCalledAt)) {
        if (order.catStatus && order.catStatus[cat] !== "done") {
          catStartTimes[cat] = Number(ts);
        }
      }
    }
    const orderStart = order.receivedAt ? Number(order.receivedAt) : Date.now();

    function tick() {
      const timerEl = document.getElementById(`timer-${order.id}`);
      if (timerEl) timerEl.textContent = formatElapsed(Date.now() - orderStart);
      for (const [catName, startTime] of Object.entries(catStartTimes)) {
        const catKey = catName.replace(/\s/g, "_");
        const catTimerEl = document.getElementById(`cat-timer-${order.id}-${catKey}`);
        if (catTimerEl) catTimerEl.textContent = formatElapsed(Date.now() - startTime);
      }
    }
    tick(); // mise à jour immédiate
    const interval = setInterval(tick, 1000);

    orders.set(order.id, { card, interval, groups, order, catStartTimes });
    updateCounter();

    // Si toutes les catégories sont déjà "done" au chargement → supprimer après délai
    const loadedCatStatus = order.catStatus || {};
    const allDoneOnLoad = groups.length > 0 && groups.every(g =>
      loadedCatStatus[g.cat] === "done" || loadedCatStatus[g.cat] === "delivered"
    );
    if (allDoneOnLoad) {
      card.classList.add("all-done");
      setTimeout(() => markReady(order.id), 3000);
    }
  }

  function markReady(orderId) {
    ws.send(JSON.stringify({ type: "order_ready", orderId }));
    removeOrder(orderId);
  }

  function removeOrder(orderId) {
    const entry = orders.get(orderId);
    if (!entry) return;
    clearInterval(entry.interval);
    entry.card.classList.add("removing");
    setTimeout(() => {
      entry.card.remove();
      orders.delete(orderId);
      updateCounter();
    }, 300);
  }

  connect();
</script>
</body>
</html>
